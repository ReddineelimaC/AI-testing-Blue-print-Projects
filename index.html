<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B.L.A.S.T. Testcase Generator</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Highlighter for code blocks in Markdown -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="glass-header">
            <div class="logo">
                <span class="logo-icon">🚀</span>
                <h1>Testcase Generator <span class="badge">llama3.2</span></h1>
            </div>
            <div class="status-indicator">
                <span class="dot" id="connection-dot"></span>
                <span id="connection-status">Checking Ollama...</span>
            </div>
        </header>

        <main class="chat-container">
            <div class="chat-history" id="chat-history">
                <div class="message system-message">
                    <div class="avatar">🤖</div>
                    <div class="message-content">
                        <p>Welcome to the Local Testcase Generator!</p>
                        <p>I am powered by your local Ollama instance. Provide me with a component, feature description, or code snippet, and I will generate comprehensive test cases for you.</p>
                    </div>
                </div>
            </div>
        </main>

        <footer class="input-area glass-footer">
            <div class="input-wrapper">
                <textarea id="user-input" placeholder="Describe the feature or paste code here to generate test cases..." rows="1" autofocus></textarea>
                <button id="send-btn" class="send-btn" title="Send Request">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
